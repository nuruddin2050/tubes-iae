"A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`."
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

"Tipe data untuk tabel Payment"
type Payment {
    id: ID!
    order_id: Int!
    user_id: Int!
    amount: Float!
    payment_method: String
    status: String!
    created_at: DateTime!
    updated_at: DateTime!
}

type Query {
    "Mengambil semua data pembayaran"
    payments: [Payment!]! @all

    "Mengambil satu data pembayaran berdasarkan order_id"
    paymentByOrder(order_id: Int! @eq): Payment @first
}