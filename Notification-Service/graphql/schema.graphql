"A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`."
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

type Query {
    notifications: [Notification!]! @all
    notificationsByUserId(user_id: String! @eq): [Notification!]! @all
}

type Notification {
    id: ID!
    user_id: String!
    order_id: Int!
    title: String!
    message: String!
    is_read: Boolean!
    created_at: DateTime!
    updated_at: DateTime!
}