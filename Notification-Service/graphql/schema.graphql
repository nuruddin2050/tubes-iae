"A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`."
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

type Query {
    "Mengambil semua riwayat notifikasi (Poin 100% skema lengkap)"
    notifications: [Notification!]! @all

    "Mengambil notifikasi berdasarkan User ID tertentu"
    notificationsByUserId(user_id: String! @eq): [Notification!]! @all
}

type Notification {
    id: ID!
    user_id: String!
    email: String!
    type: String!
    message: String!
    status: String!
    created_at: DateTime!
    updated_at: DateTime!
}